  .search-wrap input:focus{box-shadow:0 8px 40px rgba(102,126,234,.2)}
  .tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding:0 20px 24px;max-width:1200px;margin:0 auto}
  .tab-btn{padding:8px 22px;border-radius:20px;border:2px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.2);cursor:pointer;font-size:.9em;color:#2d3748;transition:all .25s;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  .tab-btn:hover{border-color:#667eea;color:#667eea}
  .tab-btn.active{background:#667eea;color:#fff;border-color:#667eea}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;max-width:1200px;margin:0 auto;padding:0 20px 40px}
  .card{background:rgba(255,255,255,0.3);border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.04);transition:all .3s;cursor:pointer;border:1px solid rgba(255,255,255,0.3);display:flex;align-items:center;gap:16px;animation:fadeUp .4s ease both;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.08);border-color:#bee3f8}
  .card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4em;flex-shrink:0}
  .card-info{flex:1;min-width:0}
  .card-info h3{font-size:1em;font-weight:600;margin-bottom:3px}
  .card-info p{font-size:.8em;color:#718096;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-arrow{color:#cbd5e0;font-size:1.2em;transition:color .3s;flex-shrink:0}
  .card:hover .card-arrow{color:#667eea}
  .empty{text-align:center;padding:60px 20px;color:#a0aec0;grid-column:1/-1}
  .empty .emoji{font-size:3em;margin-bottom:16px}
  .fab-wrap{position:fixed;bottom:30px;right:30px;z-index:100}
  .fab{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(102,126,234,.4);transition:transform .3s;display:flex;align-items:center;justify-content:center}
  .fab:hover{transform:scale(1.1) rotate(90deg)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal{background:rgba(255,255,255,0.95);border-radius:24px;padding:32px;width:90%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
  .modal h2{font-size:1.3em;margin-bottom:20px}
  .modal label{display:block;font-size:.85em;color:#4a5568;margin-bottom:4px}
  .modal input,.modal select{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:.95em;margin-bottom:16px;outline:none}
  .modal input:focus,.modal select:focus{border-color:#667eea}
  .modal-btns{display:flex;gap:12px;justify-content:flex-end}
  .modal-btns button{padding:10px 24px;border-radius:10px;border:none;font-size:.95em;cursor:pointer}
  .btn-cancel{background:#edf2f7;color:#4a5568}
  .btn-confirm{background:#667eea;color:#fff}
  .btn-danger{background:#fc8181;color:#fff}
  @media(max-width:640px){header h1{font-size:1.6em}.grid{grid-template-columns:1fr}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header><h1>👑 朕的导航</h1></header>
<div class="search-wrap"><input type="text" id="searchInput" placeholder="搜索网站名称或描述..." oninput="filterCards()"></div>
<div class="tabs" id="tabs"></div>
<div class="grid" id="cardGrid"></div>
<div class="fab-wrap"><button class="fab" onclick="openAddModal()">+</button></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">添加新链接</h2>
    <label>网站名称</label><input type="text" id="linkName" placeholder="例如 Google 学术">
    <label>网址</label><input type="url" id="linkUrl" placeholder="https://">
    <label>分类</label><select id="linkCategory"></select>
    <label>图标</label><input type="text" id="linkIcon" placeholder="🔬" maxlength="2">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-danger" id="deleteBtn" style="display:none" onclick="deleteLink()">删除</button>
      <button class="btn-confirm" onclick="saveLink()">保存</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_DATA = [
  {name:'Claude AI',url:'https://claude.ai',cat:'AI 工具',icon:'🤖'},
  {name:'ChatGPT',url:'https://chatgpt.com',cat:'AI 工具',icon:'💬'},
  {name:'DeepSeek',url:'https://chat.deepseek.com',cat:'AI 工具',icon:'🧠'},
  {name:'Gemini',url:'https://gemini.google.com',cat:'AI 工具',icon:'✨'},
  {name:'豆包',url:'https://www.doubao.com',cat:'AI 工具',icon:'🫘'},
  {name:'Google Scholar',url:'https://scholar.google.com',cat:'学术科研',icon:'📚'},
  {name:'PubMed',url:'https://pubmed.ncbi.nlm.nih.gov',cat:'学术科研',icon:'🔬'},
  {name:'Web of Science',url:'https://www.webofscience.com',cat:'学术科研',icon:'📊'},
  {name:'知网 CNKI',url:'https://www.cnki.net',cat:'学术科研',icon:'🎓'},
  {name:'ResearchGate',url:'https://www.researchgate.net',cat:'学术科研',icon:'🧪'},
  {name:'Nature',url:'https://www.nature.com',cat:'学术科研',icon:'🏛️'},
  {name:'ScienceDirect',url:'https://www.sciencedirect.com',cat:'学术科研',icon:'📖'},
  {name:'X-MOL',url:'https://www.x-mol.com',cat:'学术科研',icon:'⚗️'},
  {name:'大连理工大学教务处',url:'https://teach.dlut.edu.cn',cat:'大连理工大学',icon:'🏫'},
  {name:'大连理工大学校园门户',url:'https://portal.dlut.edu.cn',cat:'大连理工大学',icon:'🔑'},
  {name:'大连理工大学研究生院',url:'https://gs.dlut.edu.cn',cat:'大连理工大学',icon:'🎓'},
  {name:'BioRender',url:'https://app.biorender.com',cat:'科研绘图',icon:'🎨'},
  {name:'GraphPad Prism',url:'https://www.graphpad.com',cat:'科研绘图',icon:'📈'},
  {name:'ImageJ/Fiji',url:'https://imagej.net/software/fiji',cat:'科研绘图',icon:'🖼️'},
  {name:'Adobe Color',url:'https://color.adobe.com',cat:'科研绘图',icon:'🌈'},
  {name:'GitHub',url:'https://github.com',cat:'编程开发',icon:'💻'},
  {name:'Gmail',url:'https://mail.google.com',cat:'效率工具',icon:'📧'},
  {name:'网易邮箱',url:'https://mail.163.com',cat:'效率工具',icon:'📧'},
  {name:'百度网盘',url:'https://pan.baidu.com',cat:'效率工具',icon:'📦'},
  {name:'DeepL 翻译',url:'https://www.deepl.com/translator',cat:'效率工具',icon:'🌏'},
  {name:'Grammarly',url:'https://app.grammarly.com',cat:'效率工具',icon:'✍️'},
  {name:'Zotero',url:'https://www.zotero.org',cat:'效率工具',icon:'🗂️'},
  {name:'Overleaf',url:'https://www.overleaf.com',cat:'效率工具',icon:'📄'},
  {name:'Mendeley',url:'https://www.mendeley.com',cat:'效率工具',icon:'📚'},
  {name:'Bilibili',url:'https://www.bilibili.com',cat:'生活娱乐',icon:'📺'},
  {name:'YouTube',url:'https://www.youtube.com',cat:'生活娱乐',icon:'▶️'},
  {name:'抖音',url:'https://www.douyin.com',cat:'生活娱乐',icon:'🎵'},
  {name:'Telegram',url:'https://web.telegram.org',cat:'生活娱乐',icon:'✈️'},
  {name:'Instagram',url:'https://www.instagram.com',cat:'生活娱乐',icon:'📸'},
  {name:'知乎',url:'https://www.zhihu.com',cat:'生活娱乐',icon:'❓'},
  {name:'微博',url:'https://weibo.com',cat:'生活娱乐',icon:'📱'},
  {name:'豆瓣',url:'https://www.douban.com',cat:'生活娱乐',icon:'🎬'},
  {name:'京东',url:'https://www.jd.com',cat:'生活娱乐',icon:'🛒'},
  {name:'淘宝',url:'https://www.taobao.com',cat:'生活娱乐',icon:'🛍️'},
  {name:'饿了么',url:'https://www.ele.me',cat:'生活娱乐',icon:'🍜'},
];

const CAT_COLORS={'AI 工具':'#764ba2','学术科研':'#667eea','科研绘图':'#38b2ac','编程开发':'#4299e1','效率工具':'#ed8936','生活娱乐':'#fc8181','大连理工大学':'#e53e3e'};
let currentData=[],editingIndex=-1,currentCat='全部';
const CATEGORIES=['全部','AI 工具','学术科研','科研绘图','编程开发','效率工具','生活娱乐','大连理工大学'];

function init(){const s=localStorage.getItem('myNavData');currentData=s?JSON.parse(s):[...DEFAULT_DATA];renderTabs();renderCards();renderCategorySelect()}
function renderTabs(){const c=document.getElementById('tabs');c.innerHTML='';CATEGORIES.forEach(cat=>{const b=document.createElement('button');b.className=`tab-btn${cat===currentCat?' active':''}`;b.textContent=cat;b.onclick=()=>{currentCat=cat;renderTabs();renderCards()};c.appendChild(b)})}
function renderCards(){const g=document.getElementById('cardGrid');const q=document.getElementById('searchInput').value.toLowerCase().trim();const f=currentData.filter(i=>(currentCat==='全部'||i.cat===currentCat)&&(!q||i.name.toLowerCase().includes(q)||i.cat.includes(q)));if(!f.length){g.innerHTML='<div class="empty"><div class="emoji">🔍</div><p>没有找到匹配的网站</p></div>';return}g.innerHTML='';f.forEach((item,i)=>{const c=CAT_COLORS[item.cat]||'#667eea';const card=document.createElement('div');card.className='card';card.style.animationDelay=`${(i%12)*.04}s`;card.innerHTML=`<div class="card-icon" style="background:${c}18;color:${c}">${item.icon||'🌐'}</div><div class="card-info"><h3>${item.name}</h3><p>${item.cat}</p></div><span class="card-arrow">→</span>`;card.title=`打开 ${item.name}`;card.onclick=()=>window.open(item.url,'_blank');card.oncontextmenu=(e)=>{e.preventDefault();openEditModal(currentData.indexOf(item))};g.appendChild(card)})}
function filterCards(){renderCards()}
function renderCategorySelect(){const s=document.getElementById('linkCategory');s.innerHTML='';CATEGORIES.filter(c=>c!=='全部').forEach(cat=>{const o=document.createElement('option');o.value=cat;o.textContent=cat;s.appendChild(o)})}
function openAddModal(){editingIndex=-1;document.getElementById('modalTitle').textContent='添加新链接';document.getElementById('linkName').value='';document.getElementById('linkUrl').value='';document.getElementById('linkIcon').value='🌐';document.getElementById('deleteBtn').style.display='none';document.getElementById('modalOverlay').classList.add('show')}
function openEditModal(idx){editingIndex=idx;const i=currentData[idx];document.getElementById('modalTitle').textContent='编辑链接';document.getElementById('linkName').value=i.name;document.getElementById('linkUrl').value=i.url;document.getElementById('linkCategory').value=i.cat;document.getElementById('linkIcon').value=i.icon||'🌐';document.getElementById('deleteBtn').style.display='inline-block';document.getElementById('modalOverlay').classList.add('show')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}
function saveLink(){const n=document.getElementById('linkName').value.trim(),u=document.getElementById('linkUrl').value.trim(),c=document.getElementById('linkCategory').value,i=document.getElementById('linkIcon').value.trim()||'🌐';if(!n||!u){alert('请填写名称和网址');return}let fu=u;if(!u.startsWith('http')&&!u.startsWith('https'))fu='https://'+u;if(editingIndex>=0)currentData[editingIndex]={name:n,url:fu,cat:c,icon:i};else currentData.push({name:n,url:fu,cat:c,icon:i});localStorage.setItem('myNavData',JSON.stringify(currentData));closeModal();renderCards();renderTabs()}
function deleteLink(){if(editingIndex<0)return;if(!confirm(`确定删除「${currentData[editingIndex].name}」？`))return;currentData.splice(editingIndex,1);localStorage.setItem('myNavData',JSON.stringify(currentData));closeModal();renderCards();renderTabs()}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if(e.key==='/'&&!e.ctrlKey&&!e.metaKey){document.getElementById('searchInput').focus();e.preventDefault()}});
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
